<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보올림피아드 DFS 서술형 마스터</title>
    <style>
        :root {
            --dfs-deep: #4338ca;
            --dfs-light: #e0e7ff;
            --accent: #f59e0b;
            --text-dark: #1e293b;
            --white: #ffffff;
        }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: #f8fafc;
            color: var(--text-dark);
            line-height: 1.7;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            background: linear-gradient(135deg, #312e81 0%, #4338ca 100%);
            color: white;
            padding: 50px 20px;
            border-radius: 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px -5px rgba(67, 56, 202, 0.3);
        }

        .shining-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #6366f1; }
            to { text-shadow: 0 0 15px #fff, 0 0 30px #818cf8; }
        }

        .intro-card {
            background: var(--white);
            padding: 25px;
            border-radius: 16px;
            border-left: 5px solid var(--accent);
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .problem-card {
            background: var(--white);
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .problem-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1);
        }

        .problem-header {
            padding: 20px 25px;
            background: #f1f5f9;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .problem-header::after {
            content: '답안 확인하기 ▼';
            font-size: 0.8rem;
            color: var(--dfs-deep);
            background: var(--dfs-light);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .problem-content {
            padding: 25px;
        }

        .answer-area {
            display: none;
            padding: 25px;
            background: #fafafa;
            border-top: 2px dashed #e2e8f0;
        }

        .keyword-badge {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .standard-ans {
            background: var(--dfs-light);
            color: var(--dfs-deep);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            font-weight: 500;
        }

        code {
            background: #fee2e2;
            color: #b91c1c;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
        }

        pre {
            background: #1e293b;
            color: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-size: 0.9rem;
        }

        .btn-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--dfs-deep);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="shining-title">DFS Descriptive Master</h1>
        <p style="margin-top: 15px; opacity: 0.9;">중등 정보올림피아드 서술형 대비 10선</p>
        <p style="font-size: 0.9rem;">Seyeong Coding Research Institute | Ph.D. Kim</p>
    </header>

    <div class="intro-card">
        <strong> 서술형 시험 꿀팁:</strong> 올림피아드 서술형에서는 단순히 '작동한다'가 아니라, <b>"왜(Why)"</b> 그렇게 되는지 원리를 포함해야 고득점을 받습니다. 아래 문제들을 통해 논리적인 설명 흐름을 연습하세요.
    </div>

    <div id="problemList">
        </div>

    <footer>
        <p>© 2026 Seyeong Coding Research Institute. 모든 권리는 세영코딩연구소에 있습니다.</p>
    </footer>
</div>

<button class="btn-top" onclick="window.scrollTo(0,0)">↑</button>

<script>
    const problems = [
        {
            title: "문제 1. DFS의 핵심 원리",
            content: "1) DFS(깊이 우선 탐색)란 무엇인지 설명하시오.<br>2) DFS가 '깊이 우선'이라고 불리는 이유를 설명하시오.<br>3) BFS와의 차이도 함께 간단히 설명하시오.",
            keywords: ["한 갈래", "끝까지", "재귀/스택", "최단거리(BFS)"],
            ans: "DFS는 시작 정점에서 연결된 한 방향을 선택해 더 이상 갈 수 없을 때까지 깊게 탐색하는 방식입니다. 한 갈래를 완전히 확인한 뒤 되돌아오기 때문에 '깊이 우선'이라 불립니다. 모든 정점을 넓게 확인하며 최단거리를 찾는 BFS와 달리, DFS는 재귀 구조를 통해 경로의 존재나 그래프의 구조를 파악하는 데 유리합니다."
        },
        {
            title: "문제 2. 방문 배열(visited)의 필요성",
            content: "1) 방문 배열이 없으면 어떤 문제가 생기는지 쓰시오.<br>2) 방문 배열은 언제 표시하는 것이 좋은지 쓰시오.<br>3) 그 이유도 함께 설명하시오.",
            keywords: ["무한 루프", "사이클", "중복 방문 방지", "진입 직후"],
            ans: "방문 배열이 없으면 그래프 내의 사이클(Cycle) 때문에 이미 방문한 정점을 다시 방문하게 되어 무한 루프에 빠질 수 있습니다. 방문 표시는 정점에 진입하는 즉시(함수 호출 직후) 하는 것이 좋습니다. 그래야만 해당 정점에서 파생되는 다른 탐색 과정에서 자기 자신을 다시 호출하는 중복 방문을 확실히 차단할 수 있기 때문입니다."
        },
        {
            title: "문제 3. DFS의 동작 과정 추적",
            content: "1번(2,3 연결), 2번(4 연결), 3번(5 연결) 그래프에서 작은 번호부터 방문할 때의 순서와 과정을 설명하시오.",
            keywords: ["1-2-4-3-5", "복귀(Backtrack)", "번호순"],
            ans: "방문 순서는 1 → 2 → 4 → 3 → 5 입니다. 1번에서 2번을 먼저 선택하고, 2번에서 4번으로 깊게 들어갑니다. 4번에서 더 갈 곳이 없으므로 다시 2번, 1번으로 되돌아온(복귀) 뒤, 아직 방문하지 않은 3번으로 들어가 5번까지 탐색을 마칩니다."
        },
        {
            title: "문제 4. 재귀 DFS 코드의 의미",
            content: "<pre>void dfs(int now) {\n  visited[now] = 1;\n  for (int next=1; next<=n; next++) {\n    if (graph[now][next] == 1 && visited[next] == 0) {\n      dfs(next);\n    }\n  }\n}</pre>위 코드에서 <code>visited[now]=1</code>과 <code>if</code>문의 의미를 설명하시오.",
            keywords: ["현재 정점 방문 표시", "간선 존재 여부", "방문 여부 확인", "재귀 호출"],
            ans: "<code>visited[now] = 1;</code>은 현재 정점에 도착했음을 기록해 중복 방문을 막는 것입니다. <code>if</code>문은 두 정점이 연결되어 있고(간선 존재), 다음 정점을 아직 방문하지 않았을 때만 진행하겠다는 '탐색 조건'입니다. <code>dfs(next);</code>는 조건을 만족할 때 더 깊은 단계로 함수를 호출하는 과정입니다."
        },
        {
            title: "문제 5. DFS와 연결 요소(Connected Component)",
            content: "연결 요소란 무엇이며, DFS를 이용해 그 개수를 세는 방법을 서술하시오.",
            keywords: ["덩어리", "모든 정점 순회", "DFS 시작 횟수"],
            ans: "연결 요소란 서로 경로로 이어져 있는 정점들의 덩어리입니다. DFS 한 번은 시작점과 연결된 모든 정점을 훑기 때문에, 전체 정점을 순회하며 '아직 방문하지 않은 정점'을 발견할 때마다 DFS를 새로 시작하고 그 횟수를 카운트하면 연결 요소의 개수를 구할 수 있습니다."
        },
        {
            title: "문제 6. 격자(Grid) 탐색과 DFS",
            content: "2차원 격자 지도를 그래프로 보고 DFS를 사용할 때의 주의점을 설명하시오.",
            keywords: ["칸=정점", "상하좌우=간선", "경계 검사", "장애물 확인"],
            ans: "격자의 각 칸을 정점으로, 상하좌우 인접 관계를 간선으로 보면 그래프와 동일합니다. 격자 DFS에서는 배열의 인덱스가 범위를 벗어나지 않는지(경계 검사)와 벽/장애물(0인 칸)을 방문하지 않도록 예외 처리를 철저히 해야 합니다."
        },
        {
            title: "문제 7. DFS vs BFS 선택 기준",
            content: "1) 미로의 최소 이동 횟수<br>2) 연결된 색칠 영역 개수<br>각각 어떤 탐색이 적절한지 이유와 함께 설명하시오.",
            keywords: ["최단거리=BFS", "영역 탐색=DFS", "큐 vs 재귀"],
            ans: "미로 최단거리는 BFS가 적절합니다. BFS는 거리순으로 탐색하므로 처음 도착점에 도달한 순간이 최단임을 보장합니다. 반면 영역 개수 세기는 DFS가 적절합니다. 한 영역을 끝까지 파고들어 덩어리를 확인하는 구조가 재귀적으로 구현하기 더 직관적이고 단순하기 때문입니다."
        },
        {
            title: "문제 8. DFS의 '되돌아옴(복귀)'",
            content: "DFS에서 '되돌아온다'는 말의 의미와 재귀 함수에서의 구현 원리를 설명하시오.",
            keywords: ["함수 종료", "이전 호출로 복귀", "모든 갈래 확인"],
            ans: "'되돌아온다'는 것은 현재 정점에서 더 이상 갈 곳이 없을 때, 이전 정점으로 돌아가 남은 이웃 정점을 확인하는 과정입니다. 재귀 함수에서는 현재 실행 중인 함수가 종료(return)되면 자연스럽게 호출 스택의 이전 단계로 제어권이 넘어가며 복귀가 이루어집니다."
        },
        {
            title: "문제 9. 경로 존재 여부 판단",
            content: "정점 A에서 B로 갈 수 있는지 DFS로 판단하는 과정을 설명하시오.",
            keywords: ["A에서 탐색 시작", "B 방문 여부 확인", "도달 가능성"],
            ans: "정점 A를 시작점으로 DFS를 수행합니다. 탐색 도중 정점 B를 호출하게 되거나, 탐색이 모두 끝난 후 <code>visited[B]</code>가 1(참)이 되어 있다면 A에서 B로 가는 경로가 존재한다고 판단할 수 있습니다."
        },
        {
            title: "문제 10. DFS와 백트래킹(Backtracking)",
            content: "DFS가 백트래킹의 기초가 되는 이유를 구조적 관점에서 설명하시오.",
            keywords: ["선택-진행-복구", "상태 공간 트리", "완전 탐색"],
            ans: "백트래킹은 모든 가능성을 탐색하다가 답이 아니면 돌아오는 기법입니다. DFS의 '한 방향으로 시도하고 막히면 이전으로 돌아와 다른 방향을 시도하는' 구조는 백트래킹의 핵심 메커니즘인 '상태 공간 트리 탐색'과 일치합니다. 따라서 DFS는 순열, 조합 등 모든 경우를 따져야 하는 백트래킹의 기본 틀이 됩니다."
        }
    ];

    const problemList = document.getElementById('problemList');

    problems.forEach((p, index) => {
        const card = document.createElement('div');
        card.className = 'problem-card';
        card.innerHTML = `
            <div class="problem-header" onclick="toggleAnswer(${index})">
                <span>${p.title}</span>
            </div>
            <div class="problem-content">
                ${p.content}
            </div>
            <div class="answer-area" id="ans-${index}">
                <div style="margin-bottom: 10px;">
                    <strong> 핵심 키워드:</strong><br>
                    ${p.keywords.map(k => `<span class="keyword-badge">${k}</span>`).join('')}
                </div>
                <div class="standard-ans">
                    <strong>[표준 답안]</strong><br>
                    ${p.ans}
                </div>
            </div>
        `;
        problemList.appendChild(card);
    });

    function toggleAnswer(index) {
        const ans = document.getElementById(`ans-${index}`);
        const header = ans.parentElement.querySelector('.problem-header');
        if (ans.style.display === 'block') {
            ans.style.display = 'none';
            header.style.background = '#f1f5f9';
        } else {
            ans.style.display = 'block';
            header.style.background = '#e2e8f0';
        }
    }
</script>

</body>
</html>
