    subs:[
      {label:'|A∪B| = ?', hint:'A∩B는 6의 배수입니다.', ans:'⌊n/2⌋+⌊n/3⌋-⌊n/6⌋', check:(v)=>{const s=v.replace(/\s/g,'');return(s.includes('n/2')&&s.includes('n/3')&&s.includes('n/6'))}, score:10, partial:4,
       feedback:'|A|=⌊n/2⌋, |B|=⌊n/3⌋, |A∩B|=⌊n/6⌋(6의 배수)\n포함-배제: ⌊n/2⌋+⌊n/3⌋-⌊n/6⌋'},
    ]
  },
];

const state={answers:{},revealed:{},hints:{},scores:{}};
let activeQ=1;

function setEq(inp,ans){
  const normalize=s=>s.replace(/\s/g,'').replace(/\{|\}/g,'').split(',').map(x=>x.trim()).sort().join(',');
  return normalize(inp)===normalize(ans);
}

function updateScoreUI(){
  let total=0;
  Object.values(state.scores).forEach(s=>total+=s);
  document.getElementById('cur-score').textContent=total;
  document.getElementById('score-bar').style.width=(total)+'%';
  renderProg();
  renderNav();
}

function getQScore(n){
  const q=QS[n-1];
  let sc=0;
  q.subs.forEach((_,i)=>{
    const key=`${n}_${i}`;
    sc+=(state.scores[key]||0);
  });
  return sc;
}

function renderProg(){
  const w=document.getElementById('prog-row');
  w.innerHTML='';
  QS.forEach(q=>{
    const d=document.createElement('div');
    const sc=getQScore(q.n);
    const max=q.pts;
    const cls=sc===max?'done':sc>0?'partial':activeQ===q.n?'cur':'';
    d.className='pd '+cls;
    d.title=`${q.n}번: ${sc}/${max}점`;
    d.textContent=q.n;
    d.onclick=()=>goQ(q.n);
    w.appendChild(d);
  });
}

function renderNav(){
  const w=document.getElementById('q-nav');
  w.innerHTML='';
  QS.forEach(q=>{
    const btn=document.createElement('button');
    btn.className='qn-btn'+(activeQ===q.n?' active':'');
    const sc=getQScore(q.n);
    if(sc===q.pts) btn.classList.add('done');
    else if(sc>0) btn.classList.add('partial');
    btn.textContent=`${q.n}번 (${sc}/${q.pts})`;
    btn.onclick=()=>goQ(q.n);
    w.appendChild(btn);
  });
}

function goQ(n){
  activeQ=n;
  renderNav();
  renderQ(n);
  renderProg();
  document.getElementById('q-area').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderQ(n){
  const q=QS[n-1];
  const area=document.getElementById('q-area');
  let html=`<div class="q-card">
    <div class="q-header">
      <div class="q-num">${q.n}번 — ${q.title}</div>
      <span class="q-pts">${q.pts}점</span>
    </div>
    <div class="q-text q-math">${q.stem.replace(/\n/g,'<br>')}</div>`;
  q.subs.forEach((s,i)=>{
    const key=`${n}_${i}`;
    const rev=state.revealed[key];
    const sc=state.scores[key];
    const checked=state.answers[key]!==undefined&&rev;
    html+=`<div class="sub-q">
      <div class="sub-q-label">${s.label}
        ${rev?`<span class="score-chip ${sc===s.score?'sc-full':sc>0?'sc-part':'sc-zero'}">${sc}/${s.score}점</span>`:''}
      </div>
      <textarea class="ans-input${rev?(sc===s.score?' correct':' wrong'):''}" id="inp_${key}" rows="2" placeholder="답을 입력하세요...">${state.answers[key]||''}</textarea>
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
        <button class="btn" onclick="showHint(${n},${i})" style="font-size:12px;padding:5px 11px">힌트 보기</button>
        ${!rev?`<button class="btn" onclick="checkSub(${n},${i})" style="font-size:12px;padding:5px 11px">정답 확인</button>`:''}
      </div>
      <div class="hint-box${state.hints[key]?' on':''}" id="hint_${key}">${s.hint}</div>
      ${rev?`<div class="feedback-box on ${sc===s.score?'ok':sc>0?'partial':'ng'}">
        <div class="fb-title ${sc===s.score?'ok':sc>0?'partial':'ng'}">${sc===s.score?'정답!':sc>0?'부분 정답':'오답'}</div>
        <div class="fb-body">${s.feedback}</div>
        <div class="answer-reveal"><div class="ar-lbl">모범 답안</div><div class="ar-val">${s.ans}</div></div>
      </div>`:''}
    </div>`;
  });
  html+=`<div class="nav-bottom">
    <button class="btn" onclick="goQ(${n>1?n-1:1})" ${n===1?'disabled':''}>← 이전</button>
    <button class="btn pri" onclick="goQ(${n<10?n+1:10})" ${n===10?'disabled':''}>다음 →</button>
  </div>
  </div>`;
  area.innerHTML=html;
  if(n===10){
    area.innerHTML+=`<div style="text-align:center;margin-top:1rem">
      <button class="btn pri" onclick="showSummary()">전체 결과 보기</button>
    </div>`;
  }
}

function showHint(n,i){
  const key=`${n}_${i}`;
  state.hints[key]=true;
  const h=document.getElementById('hint_'+key);
  if(h)h.classList.add('on');
}

function checkSub(n,i){
  const q=QS[n-1];
  const s=q.subs[i];
  const key=`${n}_${i}`;
  const inp=document.getElementById('inp_'+key);
  const val=inp?inp.value.trim():'';
  state.answers[key]=val;
  state.revealed[key]=true;
  const correct=s.check(val);
  if(correct) state.scores[key]=s.score;
  else{
    const hasContent=val.length>2;
    state.scores[key]=hasContent?s.partial:0;
  }
  updateScoreUI();
  renderQ(n);
}

function showSummary(){
  const s=document.getElementById('summary');
  s.classList.add('on');
  let total=0;
  let html='<div style="font-size:16px;font-weight:500;margin-bottom:1rem">전체 채점 결과</div><div class="summary-grid">';
  QS.forEach(q=>{
    const sc=getQScore(q.n);
    total+=sc;
    html+=`<div class="sg-item"><div class="sgi-num">${q.n}번 (${q.pts}점)</div><div class="sgi-score" style="color:${sc===q.pts?'#1D9E75':sc>0?'#854F0B':'#E24B4A'}">${sc}점</div></div>`;
  });
  html+=`</div><div style="font-size:22px;font-weight:500;text-align:center;padding:1rem 0;border-top:0.5px solid var(--color-border-tertiary)">총점: ${total} / 100점</div>`;
  if(total>=90) html+=`<div style="text-align:center;font-size:13px;color:#1D9E75;margin-top:6px">우수합니다! 집합의 핵심 개념을 잘 이해했습니다.</div>`;
  else if(total>=70) html+=`<div style="text-align:center;font-size:13px;color:#854F0B;margin-top:6px">잘 했습니다. 틀린 문제를 다시 검토해보세요.</div>`;
  else html+=`<div style="text-align:center;font-size:13px;color:#E24B4A;margin-top:6px">기초 개념을 다시 복습하고 재도전해보세요!</div>`;
  s.innerHTML=html;
  s.scrollIntoView({behavior:'smooth',block:'nearest'});
}

renderProg();
renderNav();
renderQ(1);
</script>
