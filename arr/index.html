
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c1: #0a0a12;
    --c2: #111120;
    --c3: #1a1a2e;
    --accent: #7f77dd;
    --accent2: #5dcaa5;
    --accent3: #ef9f27;
    --accent4: #d85a30;
    --dim: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.08);
    --text: rgba(255,255,255,0.9);
    --muted: rgba(255,255,255,0.45);
  }

  body { background: var(--c1); font-family: 'Noto Sans KR', sans-serif; color: var(--text); overflow-x: hidden; }

  .hero {
    padding: 3.5rem 1.5rem 2rem;
    text-align: center;
    position: relative;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(127,119,221,0.18) 0%, transparent 70%);
  }

  .hero-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    border: 0.5px solid rgba(127,119,221,0.4);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 1.2rem;
    letter-spacing: 0.08em;
  }

  .hero h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0.8rem;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 2rem;
  }

  .nav-pills {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    padding-bottom: 2rem;
  }

  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: var(--dim);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .pill:hover, .pill.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(127,119,221,0.1);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  .card {
    background: var(--c1);
    padding: 1.8rem 1.6rem;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }

  .card:hover { background: var(--c2); }

  .card-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 0.8rem;
    letter-spacing: 0.05em;
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-badge {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 400;
  }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 1rem;
  }

  .card-arrow {
    position: absolute;
    top: 1.8rem;
    right: 1.6rem;
    color: var(--muted);
    font-size: 16px;
    transition: transform 0.2s, color 0.2s;
  }

  .card:hover .card-arrow { transform: translateX(4px); color: var(--accent); }

  .preview {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.7;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: #b0b0d0;
    overflow: hidden;
    max-height: 80px;
    position: relative;
  }

  .preview::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 30px;
    background: linear-gradient(transparent, var(--c1));
  }

  .card:hover .preview::after { background: linear-gradient(transparent, var(--c2)); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 2rem 1rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--c2);
    border: 0.5px solid rgba(127,119,221,0.3);
    border-radius: 12px;
    width: 100%;
    max-width: 700px;
    overflow: hidden;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-header {
    padding: 1.4rem 1.6rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }

  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .modal-close {
    background: var(--dim);
    border: 0.5px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 1.6rem; }

  .section-label {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.7rem;
  }

  .desc-block {
    font-size: 14px;
    line-height: 1.8;
    color: rgba(255,255,255,0.75);
    margin-bottom: 1.6rem;
  }

  .code-block {
    background: var(--c3);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 1.4rem;
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--border);
    background: rgba(255,255,255,0.03);
  }

  .code-lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .copy-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .copy-btn:hover { background: var(--dim); color: var(--text); }

  pre {
    padding: 1.2rem 1.4rem;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
  }

  .kw { color: #c792ea; }
  .fn { color: #82aaff; }
  .str { color: #c3e88d; }
  .num { color: #f78c6c; }
  .cmt { color: #546e7a; font-style: italic; }
  .ty { color: var(--accent2); }
  .op { color: var(--accent3); }

  .tip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.4rem; }

  .tip-card {
    background: rgba(255,255,255,0.03);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .tip-card-title { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .tip-card-body { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .quiz-area { margin-top: 1.4rem; }

  .quiz-q {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 1rem;
    line-height: 1.7;
    padding: 14px;
    background: rgba(127,119,221,0.08);
    border: 0.5px solid rgba(127,119,221,0.2);
    border-radius: 8px;
  }

  .quiz-options { display: flex; flex-direction: column; gap: 8px; }

  .quiz-opt {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    background: var(--dim);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    transition: all 0.15s;
  }

  .quiz-opt:hover { border-color: var(--accent); background: rgba(127,119,221,0.1); }
  .quiz-opt.correct { border-color: var(--accent2); background: rgba(93,202,165,0.12); color: var(--accent2); }
  .quiz-opt.wrong { border-color: var(--accent4); background: rgba(216,90,48,0.1); color: var(--accent4); }

  .quiz-result {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    display: none;
  }

  .quiz-result.show { display: block; }
  .quiz-result.ok { background: rgba(93,202,165,0.1); color: var(--accent2); border: 0.5px solid rgba(93,202,165,0.3); }
  .quiz-result.fail { background: rgba(216,90,48,0.1); color: var(--accent4); border: 0.5px solid rgba(216,90,48,0.3); }

  .footer-bar {
    padding: 2rem 1.5rem;
    text-align: center;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
</style>

      { title: 'Safety Margin', body: '배열 크기는 항상 문제 최대치보다 5~10 더 크게' },

      answer: 1,

  {

<span class="kw">for</span>(<span class="ty">int</span> i <span class="op">=</span> <span class="num">0</span>; i <span class="op">&lt;</span> R; i<span class="op">++</span>) {

let currentQuizAnswered = false;

function renderCards(filter) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  patterns.filter(p => filter === 'all' || p.tag === filter).forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(p);
    card.innerHTML = `
      <div class="card-num">${p.num}</div>
      <div class="card-title" style="color:${p.color}">
        ${p.title}
        <span class="card-badge" style="background:${p.badgeColor};color:${p.badgeText}">${p.badge}</span>
      </div>
      <div class="card-desc">${p.desc}</div>
      <div class="preview">${p.preview}</div>
      <div class="card-arrow">→</div>
    `;
    grid.appendChild(card);
  });
}

function filterCards(f, el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderCards(f);
}

function openModal(p) {
  currentQuizAnswered = false;
  document.getElementById('mTitle').textContent = `${p.num}. ${p.title}`;
  document.getElementById('mSub').textContent = p.desc;

  const tipsHtml = p.tips.map(t => `
    <div class="tip-card">
      <div class="tip-card-title" style="color:${p.color}">${t.title}</div>
      <div class="tip-card-body">${t.body}</div>
    </div>
  `).join('');

  const optsHtml = p.quiz.opts.map((o, i) => `
    <button class="quiz-opt" onclick="checkQuiz(this, ${i}, ${p.quiz.answer}, '${p.quiz.ok.replace(/'/g,"\\'")}', '${p.quiz.fail.replace(/'/g,"\\'")}', ${p.quiz.answer})">${o}</button>
  `).join('');

  document.getElementById('mBody').innerHTML = `
    <div class="section-label">상세 설명</div>
    <div class="desc-block">${p.desc}</div>
    <div class="section-label">코드 예시</div>
    <div class="code-block">
      <div class="code-header">
        <span class="code-lang">C Language</span>
        <button class="copy-btn" onclick="copyCode(this, ${JSON.stringify(p.preview)})">복사</button>
      </div>
      <pre>${p.fullCode}</pre>
    </div>
    <div class="section-label">핵심 포인트</div>
    <div class="tip-grid">${tipsHtml}</div>
    <div class="quiz-area">
      <div class="section-label">확인 퀴즈</div>
      <div class="quiz-q">${p.quiz.q}</div>
      <div class="quiz-options">${optsHtml}</div>
      <div class="quiz-result" id="qResult"></div>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function checkQuiz(btn, chosen, answer, ok, fail) {
  if (currentQuizAnswered) return;
  currentQuizAnswered = true;
  const opts = btn.parentElement.querySelectorAll('.quiz-opt');
  opts.forEach((o, i) => {
    o.style.pointerEvents = 'none';
    if (i === answer) o.classList.add('correct');
  });
  if (chosen !== answer) btn.classList.add('wrong');
  const res = document.getElementById('qResult');
  res.textContent = chosen === answer ? '✓ ' + ok : '✗ ' + fail;
  res.className = 'quiz-result show ' + (chosen === answer ? 'ok' : 'fail');
}

function copyCode(btn, code) {
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '복사됨!';
    setTimeout(() => btn.textContent = '복사', 1500);
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

renderCards('all');
</script>
